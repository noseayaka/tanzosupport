<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>TANZO お困りごと診断 | 鉄フライパンサポート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;          /* 紙白 */
    --canvas:#f7f5f1;       /* 余白側のほんのり温かい白 */
    --ink:#1c1b19;          /* 墨に近い黒 */
    --ink-2:#57544e;        /* 副次テキスト */
    --ink-3:#928e86;        /* 補助・ヒント */
    --line:#e7e3db;         /* ヘアライン */
    --surface:#f6f4ef;      /* カード面 */
    --surface-2:#efece5;
    --warn:#a85a30;         /* 焼き目のテラコッタ（注意・原因系） */
    --warn-bg:#faf2ea;
    --warn-line:#e6c8ab;
    --safe:#46647d;         /* 焼き戻しの青（正常・安心系） */
    --safe-bg:#eef1f4;
    --safe-line:#c4d1db;
    --radius:14px;
    --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    font-family:var(--sans);
    background:var(--canvas);
    color:var(--ink);
    line-height:1.9;
    letter-spacing:.02em;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:600px;margin:0 auto;min-height:100vh;min-height:100dvh;
    background:var(--bg);display:flex;flex-direction:column;
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  @media (min-width:640px){
    .app{border-left:1px solid var(--line);border-right:1px solid var(--line)}
  }

  /* ---------- ヘッダー ---------- */
  header{
    padding:calc(18px + env(safe-area-inset-top)) 22px 16px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .logo-mark{
    border:1.7px solid var(--ink);border-radius:40px;
    padding:5px 16px 4px;font-weight:900;font-size:1.18rem;letter-spacing:.16em;
    line-height:1;
  }
  .logo-sub{font-size:.5rem;letter-spacing:.34em;color:var(--ink-2);font-weight:500}
  .tag{font-size:.7rem;color:var(--ink-3);letter-spacing:.16em;margin-top:6px;white-space:nowrap}

  /* ---------- 進捗ライン ---------- */
  .forge{
    min-height:46px;padding:0 22px;display:none;align-items:center;gap:14px;
    border-bottom:1px solid var(--line);
  }
  .forge.show{display:flex}
  .forge-label{font-size:.66rem;color:var(--ink-3);letter-spacing:.28em;white-space:nowrap}
  .forge-bar{flex:1;height:2px;background:var(--line);overflow:hidden}
  .forge-heat{
    height:100%;width:0%;background:var(--ink);
    transition:width .5s cubic-bezier(.3,.9,.3,1);
  }

  main{flex:1;padding:32px 22px 56px}

  /* ---------- 共通：アイブロウ ---------- */
  .eyebrow{
    font-size:.7rem;letter-spacing:.32em;color:var(--ink-3);font-weight:500;
    text-transform:uppercase;
  }
  .eyebrow.center{
    display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;
  }
  .eyebrow.center::before,.eyebrow.center::after{
    content:"";width:24px;height:1px;background:var(--line);
  }

  /* ---------- ホーム：はじめての方へ（白・画像2スタイル） ---------- */
  .feature{margin-bottom:38px}
  .feature .page-title{font-size:clamp(1.45rem,5.4vw,1.8rem);margin-bottom:14px}
  .feature .lead{margin-bottom:20px}
  .more-btn{
    display:inline-flex;align-items:center;gap:10px;border:1px solid var(--ink);background:none;
    color:var(--ink);font-family:var(--sans);font-weight:700;font-size:.9rem;letter-spacing:.04em;
    padding:14px 26px;cursor:pointer;transition:background .15s,color .15s;
  }
  .more-btn:hover{background:var(--ink);color:#fff}

  .home .hero-q{
    font-weight:900;font-size:clamp(1.7rem,6vw,2.15rem);line-height:1.45;
    text-align:center;letter-spacing:.04em;
  }
  .home .hero-sub{
    font-size:.86rem;color:var(--ink-2);text-align:center;margin:10px 0 30px;
    letter-spacing:.04em;
  }

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media (min-width:560px){.grid{grid-template-columns:repeat(4,1fr)}}
  .symptom{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px 10px 16px;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    cursor:pointer;min-height:120px;
    transition:transform .12s ease,border-color .12s ease,background .12s ease;
    text-align:center;color:var(--ink);font-family:var(--sans);
  }
  .symptom:active{transform:scale(.97)}
  .symptom:hover,.symptom:focus-visible{border-color:var(--ink);background:var(--surface-2);outline:none}
  .symptom svg{width:40px;height:40px;stroke:var(--ink);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .symptom .name{font-size:.9rem;font-weight:700;letter-spacing:.02em}

  .sec-title{
    margin:42px 0 16px;font-weight:700;font-size:.92rem;letter-spacing:.18em;
    display:flex;align-items:center;gap:14px;color:var(--ink);
  }
  .sec-title::after{content:"";flex:1;height:1px;background:var(--line)}

  .dish-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .dish{
    background:var(--bg);border:1px solid var(--line);border-radius:999px;
    color:var(--ink);font-size:.84rem;padding:13px 4px;cursor:pointer;
    font-family:var(--sans);min-height:46px;font-weight:500;
    transition:border-color .12s,background .12s,color .12s;
  }
  .dish:hover,.dish:focus-visible{border-color:var(--ink);background:var(--ink);color:var(--bg);outline:none}

  .link-card{
    display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;
    background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;cursor:pointer;font-family:var(--sans);color:var(--ink);
    font-weight:700;font-size:.95rem;text-align:left;margin-top:14px;
    transition:border-color .12s,background .12s;
  }
  .link-card:hover{border-color:var(--ink);background:var(--surface)}
  .link-card small{display:block;font-weight:400;font-size:.76rem;color:var(--ink-3);margin-top:4px;letter-spacing:.01em}
  .link-card .arrow{color:var(--ink);font-weight:400;flex-shrink:0}

  /* ---------- 診断フロー ---------- */
  .back{
    background:none;border:none;color:var(--ink-3);font-size:.82rem;cursor:pointer;
    padding:6px 0;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px;
    font-family:var(--sans);letter-spacing:.04em;
  }
  .back:hover{color:var(--ink)}
  .q-eyebrow{font-size:.7rem;letter-spacing:.26em;color:var(--warn);margin-bottom:12px;font-weight:700}
  .q-text{font-weight:900;font-size:clamp(1.45rem,5vw,1.85rem);line-height:1.5;margin-bottom:10px;letter-spacing:.03em}
  .q-hint{font-size:.84rem;color:var(--ink-2);margin-bottom:26px}
  .lead{font-size:.92rem;color:var(--ink-2);margin-bottom:26px;line-height:1.95}
  .choices{display:flex;flex-direction:column;gap:12px}
  .choice{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--ink);font-size:1rem;font-weight:700;text-align:left;
    padding:18px 20px;min-height:60px;cursor:pointer;width:100%;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-family:var(--sans);transition:border-color .12s,background .12s,transform .12s;
    letter-spacing:.02em;
  }
  .choice:active{transform:scale(.985)}
  .choice:hover,.choice:focus-visible{border-color:var(--ink);background:var(--surface);outline:none}
  .choice small{display:block;font-weight:400;font-size:.76rem;color:var(--ink-3);margin-top:3px}
  .choice .arrow{color:var(--ink);flex-shrink:0;font-weight:400}

  /* 写真診断 */
  .photo-grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media (min-width:520px){.photo-grid{grid-template-columns:1fr 1fr}}
  .photo-card{
    background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;text-align:left;width:100%;padding:0;
    font-family:var(--sans);color:var(--ink);
    transition:border-color .12s,transform .12s;
  }
  .photo-card:active{transform:scale(.985)}
  .photo-card:hover,.photo-card:focus-visible{border-color:var(--ink);outline:none}
  .photo-card svg{display:block;width:100%;height:120px;object-fit:cover}
  .photo-card .pc-label{padding:13px 16px;font-size:.92rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .pc-photo-note{font-size:.7rem;color:var(--ink-3);padding:0 16px 12px}

  /* ---------- 解説ページ（基礎・科学） ---------- */
  .guide{display:flex;flex-direction:column;gap:14px;margin:8px 0 4px}
  .guide .g-item{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;
  }
  .guide .g-item .g-k{font-size:.66rem;letter-spacing:.2em;color:var(--warn);font-weight:700;margin-bottom:7px}
  .guide.sci .g-item .g-k{color:var(--safe)}
  .guide .g-item h3{font-size:1rem;font-weight:900;margin-bottom:6px;letter-spacing:.02em;line-height:1.5}
  .guide .g-item p{font-size:.86rem;color:var(--ink-2)}

  /* ---------- 結果 ---------- */
  .verdict{
    border-radius:var(--radius);padding:20px;margin-bottom:22px;border:1px solid;
  }
  .verdict.warn{background:var(--warn-bg);border-color:var(--warn-line)}
  .verdict.normal{background:var(--safe-bg);border-color:var(--safe-line)}
  .verdict .v-eyebrow{font-size:.68rem;letter-spacing:.26em;margin-bottom:8px;font-weight:700}
  .verdict.warn .v-eyebrow{color:var(--warn)}
  .verdict.normal .v-eyebrow{color:var(--safe)}
  .verdict h2{font-weight:900;font-size:clamp(1.25rem,4.5vw,1.5rem);line-height:1.5;margin-bottom:10px;letter-spacing:.02em}
  .verdict p{font-size:.9rem;color:var(--ink-2)}

  .steps{counter-reset:s;display:flex;flex-direction:column;gap:12px;margin:20px 0 4px}
  .step{
    counter-increment:s;display:flex;gap:16px;align-items:flex-start;
    background:var(--surface);border-radius:var(--radius);padding:16px 18px;
    border:1px solid var(--line);
  }
  .step::before{
    content:counter(s,decimal-leading-zero);
    font-weight:700;font-size:.82rem;color:var(--ink);
    border:1px solid var(--ink);border-radius:50%;
    width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    letter-spacing:0;
  }
  .step b{display:block;font-size:.96rem;font-weight:700;margin-bottom:2px;letter-spacing:.02em}
  .step span{font-size:.84rem;color:var(--ink-2)}

  .video{
    margin:22px 0;border-radius:var(--radius);overflow:hidden;position:relative;
    background:var(--surface-2);border:1px solid var(--line);
    aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
    cursor:pointer;
  }
  .video .play{
    width:54px;height:54px;border-radius:50%;background:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .video .play::after{content:"";border-left:16px solid var(--bg);border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
  .video .v-title{font-size:.82rem;color:var(--ink-3);letter-spacing:.04em}

  .prevent{
    background:transparent;border:1px dashed var(--line);border-radius:var(--radius);
    padding:18px;margin-top:8px;
  }
  .prevent h3{font-size:.7rem;letter-spacing:.22em;color:var(--ink-3);margin-bottom:10px;font-weight:700;text-transform:uppercase}
  .prevent ul{list-style:none}
  .prevent li{font-size:.86rem;padding:5px 0 5px 1.4em;position:relative;color:var(--ink-2)}
  .prevent li::before{content:"";position:absolute;left:2px;top:1.05em;width:5px;height:5px;border-radius:50%;background:var(--ink)}

  .resolve-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:30px}
  .btn{
    border-radius:var(--radius);padding:16px 10px;font-size:.94rem;font-weight:700;cursor:pointer;
    font-family:var(--sans);min-height:56px;border:1px solid transparent;letter-spacing:.04em;
    transition:transform .12s,opacity .12s,background .12s,color .12s,border-color .12s;
  }
  .btn:active{transform:scale(.97)}
  .btn-ok{background:var(--ink);color:var(--bg)}
  .btn-ok:hover{opacity:.88}
  .btn-ng{background:var(--bg);border-color:var(--line);color:var(--ink)}
  .btn-ng:hover{border-color:var(--ink)}
  .btn-wide{width:100%;margin-top:14px}

  /* 解決画面 */
  .done{text-align:center;padding:56px 0}
  .done .mark{
    width:80px;height:80px;margin:0 auto 22px;border-radius:50%;
    border:1px solid var(--ink);display:flex;align-items:center;justify-content:center;
  }
  .done .mark svg{width:38px;height:38px;stroke:var(--ink);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .done h2{font-weight:900;font-size:clamp(1.3rem,5vw,1.55rem);margin-bottom:12px;letter-spacing:.02em}
  .done p{font-size:.88rem;color:var(--ink-2);margin-bottom:32px}

  /* 問い合わせ */
  .form{display:flex;flex-direction:column;gap:16px;margin-top:8px}
  .field label{display:block;font-size:.76rem;color:var(--ink-3);margin-bottom:7px;letter-spacing:.06em}
  .field input,.field textarea,.field select{
    width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);font-size:1rem;padding:14px;
    font-family:var(--sans);
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--ink)}
  .field input[readonly]{background:var(--surface);color:var(--ink-2)}
  .field textarea{min-height:110px;resize:vertical;line-height:1.7}
  .attach{
    border:1px dashed var(--line);border-radius:10px;padding:18px;
    text-align:center;font-size:.84rem;color:var(--ink-3);cursor:pointer;background:none;width:100%;
    font-family:var(--sans);transition:border-color .12s,color .12s;
  }
  .attach:hover{border-color:var(--ink);color:var(--ink)}
  .note{font-size:.74rem;color:var(--ink-3);line-height:1.7}

  /* 料理ガイド */
  .dish-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .dish-head h2{font-weight:900;font-size:clamp(1.4rem,5vw,1.7rem);letter-spacing:.02em}
  .dish-head .fire{
    font-size:.7rem;letter-spacing:.06em;color:var(--ink-2);font-weight:500;
    border:1px solid var(--line);border-radius:999px;padding:5px 13px;white-space:nowrap;
  }
  .kotsu{
    background:var(--warn-bg);border-left:2px solid var(--warn);
    padding:16px 18px;border-radius:0 10px 10px 0;margin-top:20px;
  }
  .kotsu b{display:block;font-size:.68rem;letter-spacing:.18em;color:var(--warn);margin-bottom:5px;font-weight:700}
  .kotsu p{font-size:.9rem;color:var(--ink-2)}

  /* ---------- TANZO風 見出し ---------- */
  .page-head{margin-bottom:22px}
  .page-eyebrow{
    display:inline-flex;align-items:center;gap:12px;
    font-size:.7rem;letter-spacing:.3em;color:var(--ink-3);font-weight:500;
    text-transform:uppercase;margin-bottom:16px;
  }
  .page-eyebrow::after{content:"";width:22px;height:2px;background:var(--ink-3)}
  .page-title{
    font-weight:900;font-size:clamp(1.7rem,6vw,2.1rem);line-height:1.4;letter-spacing:.04em;
    border-left:4px solid var(--ink);padding-left:16px;
  }

  /* ---------- 初心者ステッパー（横並び） ---------- */
  .stepper{display:flex;align-items:flex-start;margin:10px 0 26px}
  .s-node{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;
    position:relative;background:none;border:none;font-family:var(--sans);padding:0;min-width:0;
  }
  .s-node:not(:last-child)::after{
    content:"";position:absolute;top:20px;left:50%;width:100%;height:1px;background:var(--line);z-index:0;
  }
  .s-node.active:not(:last-child)::after,.s-node.done:not(:last-child)::after{background:var(--ink)}
  .s-circle{
    width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--bg);
    display:flex;align-items:center;justify-content:center;position:relative;z-index:1;
    transition:background .15s,border-color .15s;
  }
  .s-circle svg{width:22px;height:22px;stroke:var(--ink-2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .s-node.done .s-circle{border-color:var(--ink)}
  .s-node.done .s-circle svg{stroke:var(--ink)}
  .s-node.active .s-circle{background:var(--ink);border-color:var(--ink)}
  .s-node.active .s-circle svg{stroke:#fff}
  .s-label{font-size:.72rem;color:var(--ink-3);font-weight:700;text-align:center;line-height:1.3;letter-spacing:.01em}
  .s-node.active .s-label,.s-node.done .s-label{color:var(--ink)}

  .s-detail{animation:fade .3s ease}
  .s-d-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .s-d-icon{width:52px;height:52px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .s-d-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .s-d-num{font-size:.62rem;letter-spacing:.18em;color:var(--ink-3);font-weight:700;margin-bottom:3px}
  .s-d-head h2{font-weight:900;font-size:1.2rem;letter-spacing:.02em;line-height:1.4}
  .s-d-lead{font-size:.86rem;color:var(--ink-2);margin-bottom:4px}
  .s-detail .steps{margin:6px 0 0}
  .s-nav{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
  .s-nav button{
    flex:1;border:1px solid var(--line);background:var(--bg);border-radius:var(--radius);
    padding:13px 10px;font-size:.84rem;font-weight:700;color:var(--ink);cursor:pointer;font-family:var(--sans);
    transition:border-color .12s,background .12s;
  }
  .s-nav button:hover:not(:disabled){border-color:var(--ink);background:var(--surface)}
  .s-nav button:disabled{opacity:.32;cursor:default}

  /* フッ素との違い・関連リンク（詳細パネル内で再利用） */
  .j-diff{
    background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:10px;
    padding:13px 15px;margin-top:14px;
  }
  .j-diff b{display:block;font-size:.64rem;letter-spacing:.16em;color:var(--warn);font-weight:700;margin-bottom:5px}
  .j-diff p{font-size:.83rem;color:var(--ink-2)}
  .j-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .j-link{
    border:1px solid var(--line);border-radius:999px;background:var(--bg);
    padding:9px 15px;font-size:.8rem;font-weight:700;color:var(--ink);cursor:pointer;
    font-family:var(--sans);transition:border-color .12s,background .12s;
  }
  .j-link:hover{border-color:var(--ink);background:var(--surface)}

  /* ステップ見出し横のナビ矢印 */
  .s-d-title{flex:1;min-width:0}
  .s-d-nav{display:flex;gap:8px;flex-shrink:0}
  .s-arrow{
    width:34px;height:34px;border:1px solid var(--line);background:var(--bg);border-radius:50%;
    color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-family:var(--sans);padding:0;flex-shrink:0;transition:border-color .12s,background .12s;
  }
  .s-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .s-arrow:hover:not(:disabled){border-color:var(--ink);background:var(--surface)}
  .s-arrow:disabled{opacity:.3;cursor:default}

  /* feature（ホーム）ボタン横並び */
  .feature-btns{display:flex;flex-wrap:wrap;gap:12px}

  /* ---------- Q&A ---------- */
  .qa-sub{font-size:.76rem;color:var(--ink-3);letter-spacing:.06em;margin:-8px 0 16px}
  .faq-list{margin-bottom:14px}
  .faq-wrap{margin-bottom:10px}
  .faq-q{

const main=document.getElementById('main');
const forge=document.getElementById('forge');
const heat=document.getElementById('forgeHeat');
let history=[];
let currentSymptom='';
let basicsStep=0;

function setHeat(depth,total){
  forge.classList.add('show');
  heat.style.width=Math.round((depth/total)*100)+'%';
}
function hideHeat(){forge.classList.remove('show');heat.style.width='0%'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}

function go(id,push=true){
  if(push)history.push(id);
  if(id==='home')return renderHome();
  if(id==='basics'){if(push)basicsStep=0;return renderBasics();}
  if(id==='science')return renderScience();
  if(id==='dishes')return renderDishes();
  if(id==='faq')return renderFaq();
  if(id==='contact')return renderContact();
  if(id==='done')return renderDone();
  const node=FLOW[id];
  if(node.type==='question')return renderQuestion(node);
  if(node.type==='photo')return renderPhoto(node);
  if(node.type==='result')return renderResult(node);
  if(node.type==='dish')return renderDish(node);
}
function back(){
  history.pop();
  const prev=history[history.length-1]||'home';
  go(prev,false);
  window.scrollTo(0,0);
}
function home(){history=['home'];currentSymptom='';hideHeat();renderHome();window.scrollTo(0,0)}

function backBtn(){return `<button class="back" onclick="back()">← もどる</button>`}

    </div>
    ${topBtn()}
  </div>`;
}

/* ---- なぜくっつく・こびりつくの？（科学ページ） ---- */
function renderScience(){
  hideHeat();
  main.innerHTML=`
  <div class="fade">
    ${backBtn()}
    <div class="page-head">
      <p class="page-eyebrow">Why It Sticks</p>
      <h1 class="page-title">なぜ、くっついてしまうの？</h1>
    </div>
    <p class="lead">くっつきは、あなたの腕のせいでも、フライパンの欠陥でもありません。鉄と食材のあいだで起こる、理由のある現象です。仕組みがわかれば、防ぎ方も見えてきます。</p>
    <div class="guide sci">
      <div class="g-item"><div class="g-k">仕組み 01</div><h3>表面の見えない凸凹</h3><p>鉄の表面を顕微鏡で見ると、目に見えない細かな凸凹があります。食材が固まると、この凸凹に入り込んでしがみつきます。油はこの凸凹を埋めて、食材がすべる“下じき”をつくる役割をします。</p></div>
      <div class="g-item"><div class="g-k">仕組み 02</div><h3>タンパク質と金属がくっつく「熱凝着」</h3><p>卵・肉・魚・ごはんに含まれるタンパク質は、約50℃以上になると金属イオンと反応し、表面に吸着・結合します。これが「熱凝着（ねつぎょうちゃく）」。中途半端な温度で食材を入れると、この結合がいちばん強く起きてしまいます。</p></div>
      <div class="g-item"><div class="g-k">仕組み 03</div><h3>水分と予熱不足の罠</h3><p>フライパンに水分が残っていたり予熱が足りなかったりすると、表面温度が上がりきらず、熱凝着が起きやすい温度帯に長くとどまります。だから「しっかり予熱」がいちばん効くのです。</p></div>
    </div>
    <h2 class="sec-title">だから、防ぐコツは3つ</h2>
    <div class="steps">
      <div class="step"><div><b>しっかり予熱する</b><span>水滴を落としてコロコロ転がれば適温（ライデンフロスト効果が目安）</span></div></div>
      <div class="step"><div><b>油でバリアを作る</b><span>表面の凸凹を埋め、食材と金属の直接接触を防ぐ</span></div></div>
      <div class="step"><div><b>入れたら動かさず待つ</b><span>いちばんのコツ。焼き面が固まると食材同士の結合が勝り、自然にスッと剥がれます。慌てて動かすのが最大の失敗</span></div></div>
    </div>
    <div class="kotsu"><b>お米が底にくっつくのも、同じ理由</b><p>ごはんが底に貼りつくのも熱凝着です。お米のデンプンとタンパク質が、炊いている間に底の金属と密着します（おこげになる手前の状態）。炊く前にしっかり浸水させ、底にうすく油を塗っておくと防げます。炊き上がったら蒸らしすぎず、すぐ底から大きくかえすのがコツ。貼りついても、お湯を張って数分おけばふやけて簡単に取れます。</p></div>
    <button class="btn btn-ng btn-wide" onclick="go('dishes');window.scrollTo(0,0)">料理別ガイドを見る →</button>
    ${topBtn()}
  </div>`;
}

}
